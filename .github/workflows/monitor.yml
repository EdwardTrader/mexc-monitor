name: MEXC Monitor

on:
  schedule:
    # каждые 20 минут (GitHub может запускать с задержкой в несколько минут - это нормально)
    - cron: "*/20 * * * *"
  workflow_dispatch: {}   # кнопка "запустить вручную" для теста

permissions:
  contents: write   # чтобы workflow мог сохранять state.json обратно в репозиторий

concurrency:
  group: mexc-monitor
  cancel-in-progress: false

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - name: Скачать код репозитория
        uses: actions/checkout@v4

      - name: Установить Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Установить зависимости
        run: pip install requests

      - name: Запустить монитор
        env:
          TG_TOKEN: ${{ secrets.TG_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        run: python bot.py

      - name: Сохранить память бота (state.json)
        run: |
          git config user.name "mexc-monitor-bot"
          git config user.email "bot@users.noreply.github.com"
          git add state.json
          git commit -m "update state [skip ci]" || echo "нет изменений"
          git pull --rebase || true
          git push
